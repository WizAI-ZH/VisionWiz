<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" type="text/css" href="../static/css/style.css">
  <link rel="stylesheet" type="text/css" href="../static/css/font-awesome.css">
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="../node_modules/font-awesome/css/font-awesome.min.css">
  <link rel="stylesheet" href="../node_modules/optiscroll/dist/optiscroll.css">
  <link rel="stylesheet" href="../static/css/preview.css">
  <link rel="stylesheet" href="../static/css/notiflix-1.3.0.min.css">
  <link rel="stylesheet" href="../node_modules/xterm/css/xterm.css">
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      background: #f4f7fb;
      color: #1f2937;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .collect-page {
      min-height: 100vh;
      padding: 16px 20px 20px;
      box-sizing: border-box;
      overflow-x: hidden;
    }

    .collect-desc {
      max-width: 1100px;
      margin: 0 auto 12px;
      padding: 12px 16px;
      text-align: center;
      background: #eef6ff;
      border: 1px solid #d5e8ff;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }

    .collect-form-card {
      max-width: 760px;
      margin: 0 auto 16px;
      padding: 16px;
      display: flex;
      gap: 16px;
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }

    .collect-form-card .form-floating {
      flex: 1 1 0;
      min-width: 0;
    }

    .collect-workspace {
      max-width: 1320px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(180px, 220px);
      gap: 20px;
      align-items: start;
    }

    .preview-card {
      min-width: 0;
      background: #ffffff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }

    .preview-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .preview-card-title {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
    }

    .preview-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .preview-source {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 4px 12px;
      border-radius: 999px;
      background: #ede9fe;
      color: #5b21b6;
      font-size: 13px;
      text-align: center;
    }

    .preview-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 4px 12px;
      border-radius: 999px;
      background: #e5e7eb;
      color: #374151;
      font-size: 13px;
      text-align: center;
    }

    .preview-surface {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #0f172a;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview-surface video,
    .preview-surface img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .preview-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #cbd5e1;
      font-size: 14px;
      text-align: center;
      background: radial-gradient(circle at top, rgba(59, 130, 246, 0.18), rgba(15, 23, 42, 0.95));
      z-index: 3;
    }

    .collect-sidebar {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 14px;
    }

    .collect-sidebar > * {
      width: 100%;
    }

    #cbtn,
    #k210_preview_start,
    #k210_preview_stop,
    #img_history {
      min-height: 46px;
      white-space: normal;
    }

    #img_capture {
      width: 112px;
      height: 112px;
      margin: 0 auto;
      border-radius: 50%;
      border: 2px solid #0d6efd;
      box-shadow: 0 10px 22px rgba(13, 110, 253, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    @media (max-width: 1100px) {
      .collect-workspace {
        grid-template-columns: 1fr;
      }

      .collect-sidebar {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }

      .collect-sidebar > * {
        width: auto;
        flex: 1 1 180px;
      }

      #img_capture {
        margin: 0;
      }
    }

    @media (max-width: 840px) {
      .collect-form-card {
        flex-direction: column;
      }
    }

    #ImgModal .modal-dialog {
      max-width: min(1200px, calc(100vw - 24px));
      margin: 12px auto;
      height: calc(100vh - 24px);
    }

    #ImgModal .modal-content {
      height: 100%;
      display: flex;
      overflow: hidden;
    }

    #ImgModal .modal-header,
    #ImgModal .modal-footer {
      flex: 0 0 auto;
    }

    #ImgModal .modal-body {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding-bottom: 16px;
    }

    #ImgModal .modal-footer {
      position: relative;
      z-index: 1;
      gap: 10px;
      justify-content: flex-end;
      border-top: 1px solid #dee2e6;
      background: #fff;
    }

    #imglist {
      min-height: 120px;
    }

    #imglist .capture-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }

    #imglist .capture-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    #imglist .capture-item img {
      width: 100%;
      max-width: 160px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }

    #imglist .capture-item p {
      width: 100%;
      margin: 0;
      font-size: 12px;
      line-height: 1.35;
      text-align: center;
      overflow-wrap: anywhere;
    }
  </style>
</head>

<body>
  <div class="collect-page">
    <p id="descript_data_collect" class="collect-desc">Data can be collected with the local camera, and the current class name plus save path can be configured here.</p>

    <div class="collect-form-card">
      <div class="form-floating">
        <input class="form-control" id="classname">
        <label id="class_name" for="classname">Class Name</label>
      </div>
      <div class="form-floating">
        <input class="form-control" id="sender">
        <label id="save_dir" for="sender">Save Folder</label>
      </div>
      <div class="form-check d-flex align-items-center gap-2 px-2">
        <input class="form-check-input" type="checkbox" id="burst_mode">
        <label class="form-check-label" id="burst_mode_label" for="burst_mode">Burst Mode</label>
      </div>
      <div class="form-floating" style="max-width: 150px;">
        <input class="form-control" id="burst_count" type="number" min="1" max="999" value="10">
        <label id="burst_count_label" for="burst_count">Burst Count</label>
      </div>
    </div>

    <div class="collect-workspace">
      <section class="preview-card">
        <div class="preview-card-header">
          <h2 id="local_camera_preview_title" class="preview-card-title">Capture Preview</h2>
          <div class="preview-meta">
            <div id="preview_source_badge" class="preview-source">Local Camera</div>
            <div id="k210_preview_status" class="preview-status">Waiting for authentication</div>
          </div>
        </div>
        <div class="preview-surface">
          <video id="video" autoplay></video>
          <img id="k210_preview_image" alt="K210 preview" style="display:none;">
          <div id="k210_preview_placeholder" class="preview-placeholder">Open the local camera or complete controller authentication to start previewing.</div>
        </div>
      </section>

      <div class="collect-sidebar">
        <div class="dropdown">
          <a id="cbtn" class="btn btn-danger dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Select Camera
          </a>
          <ul class="dropdown-menu" id="cam_list"></ul>
        </div>

        <button type="button" id="k210_preview_start" class="btn btn-success" disabled>Start Preview</button>
        <button type="button" id="k210_preview_stop" class="btn btn-outline-secondary" disabled>Stop Preview</button>
        <button type="button" id="img_capture" class="btn btn-primary btn-lg">Capture</button>
        <button type="button" id="img_history" class="btn btn-secondary btn-lg" data-bs-toggle="modal" data-bs-target="#ImgModal">Capture Record</button>
      </div>
    </div>

    <canvas id="canvas" width="640" height="480" style="display:none; margin:0 auto;"></canvas>
  </div>
  <a id="cam"></a>

  <div class="modal fade" id="ImgModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="imgModalLabel">Capture Record</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="imglist"></div>
        <div class="modal-footer">
          <button id="open_capture_path" type="button" class="btn btn-primary">Open Folder</button>
          <button id="quit" type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../utils_protected/language-html_loader.js"></script>
  <script type="text/javascript" src="../static/js/jquery-1.11.0.min.js"></script>
  <script>try { $ = jQuery = module.exports; } catch (e) { }</script>
  <script type="text/javascript" src="../static/js/jquery-tab.js"></script>
  <script type="text/javascript" src="../static/js/notiflix-notify-aio-3.2.6.min.js"></script>
  <script type="text/javascript" src="../static/js/notiflix-report-aio-3.2.6.min.js"></script>
  <script type="text/javascript" src="../node_modules\@popperjs\core\dist\umd\popper.js"></script>
  <script type="text/javascript" src="../node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
  <script type="text/javascript" src="../node_modules\optiscroll\dist\jquery.optiscroll.js"></script>
  <script type="text/javascript" src="data-collection_renderer.js"></script>
  <script type="text/javascript" src="../static/js/blockly_main.js"></script>
</body>

</html>
